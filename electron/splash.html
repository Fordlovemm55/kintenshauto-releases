<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ออโต้โพสต์ดีว๊ะ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500&family=IBM+Plex+Sans+Thai:wght@500;600;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: transparent;
  font-family: "Sarabun", "IBM Plex Sans Thai", sans-serif;
  -webkit-user-select: none;
  -webkit-app-region: drag;
}
.container {
  width: 100%; height: 100%;
  background: radial-gradient(700px 420px at 50% -20%, rgba(99,102,241,0.18), transparent 60%), #0f172a;
  border: 1px solid rgba(99,102,241,0.3);
  border-radius: 18px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.kanji {
  font-family: "IBM Plex Sans Thai", "Sarabun", sans-serif;
  font-size: 34px; font-weight: 700;
  color: #818cf8;
  letter-spacing: 0;
  line-height: 1.1;
  margin-bottom: 10px;
  animation: glow 2.4s ease-in-out infinite;
}
@keyframes glow {
  0%,100% { text-shadow: 0 4px 18px rgba(99,102,241,0.35); }
  50% { text-shadow: 0 6px 28px rgba(99,102,241,0.6); }
}
.title {
  font-size: 16px; font-weight: 600;
  color: #e2e8f0; letter-spacing: 0;
  margin-bottom: 4px;
}
.subtitle {
  font-size: 12px; color: #94a3b8;
  letter-spacing: 0;
}
.loader {
  position: absolute; bottom: 40px;
  width: 280px; height: 4px;
  background: rgba(148,163,184,0.18);
  border-radius: 999px;
  overflow: hidden;
}
.loader::before {
  content: '';
  position: absolute; top: 0; left: -30%;
  width: 30%; height: 100%;
  background: linear-gradient(90deg, transparent, #6366f1, #818cf8, transparent);
  animation: slide 1.5s ease-in-out infinite;
}
@keyframes slide { to { left: 130%; } }
.status {
  position: absolute; bottom: 20px;
  font-size: 11px; color: #64748b;
  letter-spacing: 1px;
}
</style>
</head>
<body>
<div class="container">
  <div class="kanji">ออโต้โพสต์ดีว๊ะ</div>
  <div class="title">โพสต์คลิปอัตโนมัติ สไตล์ดีว๊ะ</div>
  <div class="subtitle">กำลังเตรียมระบบ</div>
  <div class="loader"></div>
  <div class="status" id="app-version"></div>
</div>
</body>
</html>
