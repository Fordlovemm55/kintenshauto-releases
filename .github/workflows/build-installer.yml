name: Build Installer

# Trigger: เมื่อ push tag ขึ้นต้นด้วย v (เช่น v1.0.0) หรือกดปุ่ม manual
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release:
        description: 'สร้าง Release อัตโนมัติ?'
        required: false
        default: 'false'

# ต้องมี contents: write เพื่อให้ softprops/action-gh-release สร้าง release +
# อัป asset ได้ (default GITHUB_TOKEN เป็น read-only → 403 Forbidden)
permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Windows เท่านั้น — ผู้ใช้ทั้งหมดเป็น Windows และ auto-update ต้องการ
        # latest.yml ของ Windows; build Mac/Linux พร้อมกันทำให้ latest.yml ชน
        # + เปลือง CI (ถ้าต้องรองรับ OS อื่นค่อยเพิ่ม matrix + แยก channel yml)
        os: [windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # Python 3.11 (มี distutils ในตัว) — node-gyp@9 ที่ build better-sqlite3
      # เรียก `from distutils.version import StrictVersion` ซึ่งถูกถอดออกใน
      # Python 3.12 (PEP 632). runner image อัปเป็น 3.12 default ทำให้ build
      # ที่เคยผ่านกลับ fail แม้โค้ดไม่เปลี่ยน → pin 3.11 แก้ที่ต้นเหตุ
      - name: Setup Python 3.11 (for node-gyp / better-sqlite3)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Linux: ติดตั้ง libs ที่ electron-builder ต้องใช้
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libnotify-dev libnss3-dev libxss1 libasound2-dev

      - name: Install npm dependencies
        run: npm install
        env:
          SKIP_POSTINSTALL: '1'  # ข้ามการโหลด FFmpeg/yt-dlp ตอน npm install (จะโหลดตอน build)

      - name: Build frontend
        run: npm run build-frontend
        continue-on-error: true  # ถ้า build-frontend ไม่มี ข้ามได้

      # Download dependencies (FFmpeg, yt-dlp, fpcalc) ก่อน package
      - name: Download platform binaries
        run: node scripts/download-deps.js
        continue-on-error: true

      # Build installer สำหรับแต่ละ OS
      # --publish=never: electron-builder แค่ build ไม่ publish เอง
      # (ให้ softprops/action-gh-release step เดียวเป็นตัวอัป asset → ไม่ชนกัน
      #  + ไม่ต้องส่ง GH_TOKEN เข้า build → กัน 403 ตอน electron-builder auto-publish)
      - name: Build Windows installer
        if: matrix.os == 'windows-latest'
        run: npm run dist:win -- --publish=never

      - name: Build macOS installer
        if: matrix.os == 'macos-latest'
        run: npm run dist:mac -- --publish=never

      - name: Build Linux installer
        if: matrix.os == 'ubuntu-latest'
        run: npm run dist:linux -- --publish=never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Upload artifacts เพื่อให้ดาวน์โหลดจาก GitHub Actions ได้
      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: KINTENSHAUTO-Windows
          path: |
            dist-installer/*.exe
            dist-installer/*.yml
            dist-installer/*.blockmap
          retention-days: 30

      - name: Upload macOS artifacts
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: KINTENSHAUTO-macOS
          path: |
            dist-installer/*.dmg
            dist-installer/*.yml
            dist-installer/*.blockmap
          retention-days: 30

      - name: Upload Linux artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: KINTENSHAUTO-Linux
          path: |
            dist-installer/*.AppImage
            dist-installer/*.yml
          retention-days: 30

      # ถ้า push tag → สร้าง GitHub Release พร้อมแนบไฟล์
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-installer/*.exe
            dist-installer/*.dmg
            dist-installer/*.AppImage
            dist-installer/*.yml
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## KINTENSHAUTO · 剣天照 ${{ github.ref_name }}

            ### ดาวน์โหลด
            - **Windows**: `KINTENSHAUTO-Setup-*.exe`
            - **macOS**: `KINTENSHAUTO-*.dmg`
            - **Linux**: `KINTENSHAUTO-*.AppImage`

            ### การติดตั้ง
            ดูคู่มือใน [INSTALLATION.md](../blob/main/INSTALLATION.md)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
