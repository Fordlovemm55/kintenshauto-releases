name: Test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install
        env:
          SKIP_POSTINSTALL: '1'

      - name: Run tests
        run: npm test

      - name: Run coverage
        run: npm run test:coverage
        continue-on-error: true
